<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log Error - stackr</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="navbar">
  <div class="logo">
    <div class="logo-icon">⌘</div>
    <span>stackr</span>
  </div>
</header>

<section class="log-form-section">
  <h1>Log a New Error</h1>

  <form id="errorForm" class="error-form">
    <input type="text" id="title" placeholder="Error title" required />
    <textarea id="message" placeholder="Describe the error..." required></textarea>
    <input type="text" id="tags" placeholder="Tags (react, node, etc)" />
    <textarea id="solution" placeholder="Solution (optional)"></textarea>

    <button type="submit" class="primary-btn">Submit Error</button>
  </form>
</section>

<script src="log-error.js"></script>
</body>
</html>
